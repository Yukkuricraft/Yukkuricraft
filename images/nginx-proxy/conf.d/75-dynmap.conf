# Default: dynmap.yukkuricraft.net (prod) / dev.dynmap.yukkuricraft.net (dev)
# -> env1 survival dynmap. Same conf on both hosts; DNS decides which name routes here.
server {
    listen 80;
    server_name dynmap.yukkuricraft.net dev.dynmap.yukkuricraft.net;

    set $dynmap_upstream YC-env1-survival:8123;

    location / {
        proxy_pass http://$dynmap_upstream;
        proxy_set_header Host            $http_host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Real-IP       $remote_addr;
    }

    location /up/ {
        proxy_pass http://$dynmap_upstream;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Real-IP       $remote_addr;
        proxy_buffering    off;
        proxy_read_timeout 1h;
    }
}

# Dynamic: <env>.dynmap.yukkuricraft.net (prod) / dev.<env>.dynmap.yukkuricraft.net (dev)
# -> YC-<env>-survival:8123. The `dev.` prefix is optional in the regex.
server {
    listen 80;
    server_name ~^(?:dev\.)?(?<env>env\d+)\.dynmap\.yukkuricraft\.net$;

    set $dynmap_upstream YC-$env-survival:8123;

    location / {
        proxy_pass http://$dynmap_upstream;
        proxy_set_header Host            $http_host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Real-IP       $remote_addr;
    }

    location /up/ {
        proxy_pass http://$dynmap_upstream;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Real-IP       $remote_addr;
        proxy_buffering    off;
        proxy_read_timeout 1h;
    }
}
